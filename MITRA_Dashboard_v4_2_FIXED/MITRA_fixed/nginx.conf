worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid       /var/run/nginx.pid;

events {
  worker_connections 1024;
}

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;

  # ── Logging ──────────────────────────────────────────────────────────────────
  log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                  '$status $body_bytes_sent "$http_referer" "$http_user_agent"';
  access_log /var/log/nginx/access.log main;

  # ── Performance ───────────────────────────────────────────────────────────────
  sendfile           on;
  tcp_nopush         on;
  tcp_nodelay        on;
  keepalive_timeout  65;
  gzip               on;
  gzip_types         text/plain text/css application/json application/javascript
                     text/xml application/xml application/xml+rss text/javascript;
  gzip_min_length    1024;

  # ── Rate limiting zone ────────────────────────────────────────────────────────
  limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
  limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/m;

  # ── Upstream ──────────────────────────────────────────────────────────────────
  upstream mitra_api {
    server api:3000;
    keepalive 32;
  }

  # ── HTTP → HTTPS redirect ─────────────────────────────────────────────────────
  server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
  }

  # ── HTTPS Server ──────────────────────────────────────────────────────────────
  server {
    listen              443 ssl http2;
    server_name         mitra.gov.in www.mitra.gov.in;  # ← Change to your domain

    ssl_certificate     /etc/nginx/ssl/cert.pem;
    ssl_certificate_key /etc/nginx/ssl/key.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # ── Security Headers ──────────────────────────────────────────────────────
    add_header X-Frame-Options           SAMEORIGIN;
    add_header X-Content-Type-Options    nosniff;
    add_header X-XSS-Protection          "1; mode=block";
    add_header Referrer-Policy           strict-origin-when-cross-origin;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    client_max_body_size 510M;    # Allow Unity file uploads up to 510 MB

    # ── API routes ────────────────────────────────────────────────────────────
    location /api/auth/ {
      limit_req zone=auth burst=10 nodelay;
      proxy_pass         http://mitra_api;
      proxy_http_version 1.1;
      proxy_set_header   Upgrade           $http_upgrade;
      proxy_set_header   Connection        keep-alive;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
      proxy_read_timeout 30s;
    }

    location /api/ {
      limit_req zone=api burst=50 nodelay;
      proxy_pass         http://mitra_api;
      proxy_http_version 1.1;
      proxy_set_header   Upgrade           $http_upgrade;
      proxy_set_header   Connection        keep-alive;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
      proxy_read_timeout 120s;       # Long for file uploads
      proxy_send_timeout 120s;
    }

    # ── Uploaded static files ─────────────────────────────────────────────────
    location /uploads/ {
      proxy_pass         http://mitra_api;
      proxy_http_version 1.1;
      proxy_set_header   Host $host;
      expires            7d;
      add_header         Cache-Control "public, immutable";
    }

    # ── Dashboard SPA ─────────────────────────────────────────────────────────
    location / {
      proxy_pass         http://mitra_api;
      proxy_http_version 1.1;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
      proxy_read_timeout 30s;
    }
  }
}
